<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulacro – Consulado General de España</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 40'><rect width='60' height='10' fill='%23AA151B'/><rect y='10' width='60' height='20' fill='%23F1BF00'/><rect y='30' width='60' height='10' fill='%23AA151B'/></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rojo: #c0392b; --oro: #b8960c;
    --navy: #1a2340; --bg: #f7f6f2; --white: #ffffff;
    --gray: #6b7280; --border: #d1d5db;
    --correct: #166534; --correct-bg: #dcfce7;
    --wrong: #991b1b; --wrong-bg: #fee2e2;
    --hover-tint: #fff5f5;
    --shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --shadow-strong: 0 4px 24px rgba(0,0,0,.18);
  }
  [data-theme="dark"] {
    --navy: #e8eaf0; --bg: #0f1419; --white: #1a2030;
    --gray: #8b95a8; --border: #2d3548;
    --correct: #4ade80; --correct-bg: #14532d;
    --wrong: #f87171; --wrong-bg: #7f1d1d;
    --hover-tint: #2a2030;
    --shadow: 0 1px 4px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
    --shadow-strong: 0 4px 24px rgba(0,0,0,.6);
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--navy);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px;
    transition: background .3s, color .3s; }
  header { text-align: center; margin-bottom: 24px; max-width: 640px; width: 100%; position: relative; }
  .config-menu { position: absolute; top: 0; right: 0; }
  .config-toggle { background: var(--white); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 18px; line-height: 1;
    transition: border-color .15s, background .15s, transform .15s; color: var(--navy); }
  .config-toggle:hover { border-color: var(--rojo); }
  .config-toggle.open { background: var(--hover-tint); border-color: var(--rojo); }
  .config-dropdown { position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow-strong);
    min-width: 260px; padding: 6px; z-index: 20;
    display: none; text-align: left; }
  .config-dropdown.open { display: block; animation: cfgIn .15s ease-out; }
  @keyframes cfgIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .config-section { padding: 8px 6px; border-bottom: 1px solid var(--border); }
  .config-section:last-child { border-bottom: none; }
  .config-label { font-size: 10px; color: var(--gray); text-transform: uppercase;
    letter-spacing: .1em; margin-bottom: 6px; padding: 0 4px; font-weight: 600; }
  .config-options { display: flex; flex-direction: column; gap: 2px; }
  .config-options button { background: transparent; border: none; padding: 8px 10px;
    border-radius: 6px; text-align: left; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--navy);
    display: flex; align-items: center; gap: 10px; transition: background .12s; width: 100%; }
  .config-options button:hover { background: var(--hover-tint); }
  .config-options button.active { background: var(--hover-tint); color: var(--rojo); font-weight: 600; }
  .config-options button .ck { margin-left: auto; color: var(--rojo); font-weight: 700; }
  .config-divider { height: 1px; background: var(--border); margin: 4px 0; }
  .config-action { background: transparent; border: none; padding: 10px;
    border-radius: 6px; text-align: left; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--wrong);
    width: 100%; display: flex; align-items: center; gap: 10px; transition: background .12s; }
  .config-action:hover { background: var(--wrong-bg); }
  .auto-progress { margin-top: 10px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; display: none; }
  .auto-progress.show { display: block; }
  .auto-progress > div { height: 100%; background: linear-gradient(90deg,var(--correct),var(--oro)); width: 0; }
  .escudo { display: inline-block; width: 64px; height: 43px; border-radius: 3px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.25); margin-bottom: 12px; vertical-align: middle; }
  .escudo svg { display: block; width: 100%; height: 100%; }
  .ministerio { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--gray); margin-bottom: 4px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--navy); line-height: 1.3; }
  .subtitulo { font-size: 12px; color: var(--gray); margin-top: 4px; letter-spacing: .05em; }
  .franja { width: 48px; height: 3px; background: linear-gradient(90deg,var(--rojo),var(--oro)); margin: 12px auto 0; border-radius: 2px; }
  .stats-bar { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap;
    max-width: 640px; width: 100%; margin-bottom: 16px; font-size: 12px; }
  .pill { background: var(--white); border: 1px solid var(--border); border-radius: 99px;
    padding: 5px 12px; color: var(--gray); display: inline-flex; align-items: center; gap: 6px; }
  .pill strong { color: var(--navy); font-weight: 600; }
  .pill .icon { font-size: 13px; }
  .history-btn { background: var(--white); border: 1px solid var(--border); border-radius: 99px;
    padding: 5px 12px; color: var(--navy); font-size: 12px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px; transition: border-color .15s, background .15s; }
  .history-btn:hover { border-color: var(--rojo); background: var(--hover-tint); }
  .progress-wrap { max-width: 640px; width: 100%; margin-bottom: 20px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); margin-bottom: 6px; }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg,var(--rojo),var(--oro)); border-radius: 99px; transition: width .4s ease; }
  .card { background: var(--white); border-radius: 12px; padding: 28px 24px; max-width: 640px; width: 100%;
    box-shadow: var(--shadow); transition: background .3s, box-shadow .3s; }
  .pregunta-num { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--rojo); margin-bottom: 10px; }
  .pregunta-texto { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; color: var(--navy); }
  .opciones { display: flex; flex-direction: column; gap: 10px; }
  .opcion { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; cursor: pointer; transition: border-color .15s, background .15s; background: transparent;
    text-align: left; width: 100%; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--navy); line-height: 1.4; }
  .opcion:hover:not(:disabled) { border-color: var(--rojo); background: var(--hover-tint); }
  .opcion:disabled { cursor: default; }
  .opcion .letra { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--bg);
    border: 1.5px solid var(--border); font-size: 11px; font-weight: 600; display: flex; align-items: center;
    justify-content: center; color: var(--gray); transition: background .15s, border-color .15s, color .15s; }
  .opcion.correcta { border-color: var(--correct); background: var(--correct-bg); }
  .opcion.correcta .letra { background: var(--correct); border-color: var(--correct); color: white; }
  .opcion.incorrecta { border-color: var(--wrong); background: var(--wrong-bg); }
  .opcion.incorrecta .letra { background: var(--wrong); border-color: var(--wrong); color: white; }
  .feedback { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: var(--correct-bg); color: var(--correct); }
  .feedback.mal { background: var(--wrong-bg); color: var(--wrong); }
  .nav { display: flex; justify-content: flex-end; margin-top: 20px; }
  .btn { background: var(--navy); color: var(--white); border: none; border-radius: 8px; padding: 10px 24px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: background .15s, color .15s, transform .1s; display: none; }
  .btn:hover { background: var(--rojo); }
  .btn.visible { display: block; }
  .btn:active { transform: scale(.97); }
  .resultado { display: none; text-align: center; padding: 8px 0; }
  .resultado.show { display: block; }
  .resultado .puntaje { font-family: 'Playfair Display', serif; font-size: 56px; color: var(--navy); line-height: 1; }
  .resultado .de-total { font-size: 14px; color: var(--gray); margin-top: 4px; margin-bottom: 20px; }
  .resultado .veredicto { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .resultado .mensaje { font-size: 14px; color: var(--gray); margin-bottom: 24px; line-height: 1.5; }
  .btn-reiniciar { background: var(--rojo); color: white; border: none; border-radius: 8px; padding: 12px 28px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background .15s, transform .1s; }
  .btn-reiniciar:hover { background: #a93226; }
  .btn-reiniciar:active { transform: scale(.97); }
  .barra-resultado { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px; display: flex;
    align-items: center; justify-content: center; font-size: 32px; }
  .barra-resultado.aprobado { background: var(--correct-bg); }
  .barra-resultado.repaso { background: #fef9c3; }
  .barra-resultado.reforzar { background: var(--wrong-bg); }
  [data-theme="dark"] .barra-resultado.repaso { background: #713f12; }
  .comparacion { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 24px 0 20px;
    text-align: center; }
  .comparacion .cmp { background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 8px; }
  .comparacion .cmp .label { font-size: 10px; color: var(--gray); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 4px; }
  .comparacion .cmp .val { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--navy); }
  .comparacion .cmp .delta { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .comparacion .cmp .delta.up { color: var(--correct); }
  .comparacion .cmp .delta.down { color: var(--wrong); }
  .comparacion .cmp .delta.eq { color: var(--gray); }
  .history-panel { display: none; margin-top: 20px; text-align: left; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 14px; max-height: 240px; overflow-y: auto; }
  .history-panel.show { display: block; }
  .history-panel h3 { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: .1em;
    margin-bottom: 10px; font-weight: 600; }
  .history-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .history-panel th { text-align: left; color: var(--gray); font-weight: 500; padding: 6px 8px;
    border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .history-panel td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--navy); }
  .history-panel tr:last-child td { border-bottom: none; }
  .history-panel .bar-cell { width: 80px; }
  .history-panel .bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .history-panel .bar > div { height: 100%; background: linear-gradient(90deg,var(--rojo),var(--oro)); }
  .history-panel .empty { color: var(--gray); font-size: 13px; padding: 10px 0; text-align: center; }
  @media (max-width: 480px) {
    .comparacion { grid-template-columns: 1fr; }
    .config-toggle { top: -4px; right: -4px; }
    .config-dropdown { right: -4px; min-width: 240px; }
  }
</style>
</head>
<body>
<header>
  <div class="config-menu">
    <button class="config-toggle" id="config-toggle" aria-label="Configuración" title="Configuración">⚙️</button>
    <div class="config-dropdown" id="config-dropdown" role="menu">
      <div class="config-section">
        <div class="config-label">Tema</div>
        <div class="config-options" data-group="theme">
          <button data-value="light">☀️ <span>Claro</span><span class="ck"></span></button>
          <button data-value="dark">🌙 <span>Oscuro</span><span class="ck"></span></button>
          <button data-value="auto">🖥️ <span>Sistema</span><span class="ck"></span></button>
        </div>
      </div>
      <div class="config-section">
        <div class="config-label">Avance automático</div>
        <div class="config-options" data-group="autoadvance">
          <button data-value="on">▶️ <span>Al acertar, seguir</span><span class="ck"></span></button>
          <button data-value="off">⏸️ <span>Manual (botón Siguiente)</span><span class="ck"></span></button>
        </div>
      </div>
      <div class="config-section">
        <div class="config-label">Datos</div>
        <button class="config-action" id="cfg-clear">🗑️ <span>Borrar historial de intentos</span></button>
      </div>
    </div>
  </div>
  <div class="escudo">
    <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg" aria-label="Bandera de España">
      <rect width="60" height="10" fill="#AA151B"/>
      <rect y="10" width="60" height="20" fill="#F1BF00"/>
      <rect y="30" width="60" height="10" fill="#AA151B"/>
    </svg>
  </div>
  <div class="ministerio">Ministerio de Asuntos Exteriores, UE y Cooperación</div>
  <h1>Simulacro — Auxiliar Administrativo</h1>
  <div class="subtitulo">Consulado General de España en Buenos Aires</div>
  <div class="franja"></div>
</header>
<div class="stats-bar" id="stats-bar">
  <span class="pill"><span class="icon">🏆</span> Récord: <strong id="stat-record">—</strong></span>
  <span class="pill"><span class="icon">📊</span> Intentos: <strong id="stat-attempts">0</strong></span>
  <button class="history-btn" id="btn-history">📋 Ver historial</button>
</div>
<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Pregunta 1 de 50</span>
    <span id="prog-score">Correctas: 0</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="prog-bar" style="width: 0%;"></div>
  </div>
</div>
<div class="card" id="quiz-card">
  <div class="pregunta-num" id="num-label">Pregunta 1 / 50</div>
  <div class="pregunta-texto" id="pregunta-texto">Cargando...</div>
  <div class="opciones" id="opciones"></div>
  <div class="feedback" id="feedback"></div>
  <div class="auto-progress" id="auto-progress"><div></div></div>
  <div class="nav"><button class="btn" id="btn-siguiente">Siguiente →</button></div>
  <div class="resultado" id="resultado">
    <div class="barra-resultado" id="icono-resultado"></div>
    <div class="puntaje" id="puntaje-num"></div>
    <div class="de-total">respuestas correctas de 50</div>
    <div class="veredicto" id="veredicto"></div>
    <div class="mensaje" id="mensaje-final"></div>
    <div class="comparacion" id="comparacion"></div>
    <button class="btn-reiniciar" onclick="reiniciar()">Volver a intentar</button>
  </div>
</div>
<div class="card history-panel" id="history-panel">
  <h3>Historial de intentos</h3>
  <div id="history-content"></div>
</div>
<script>
/* ============ BASE DE PREGUNTAS ============ */
const BASE = [
  { p: "Cuando la persona que solicite la expedición del pasaporte fuera menor de edad y no estuviera en posesión del documento nacional de identidad:", ops: ["Deberá aportar certificación literal de nacimiento","Deberá constar consentimiento expreso de quienes tengan atribuido el ejercicio de patria potestad o tutela","Las personas con patria potestad deberán acreditar identidad con DNI","Todas las anteriores son correctas"], r: 3 },
  { p: "En relación con el Registro de Matrícula Consular, señala la respuesta incorrecta:", ops: ["Tendrán la consideración de residentes españoles quienes residan habitualmente en la demarcación consular","Quienes se encuentren en la demarcación consular con carácter temporal, sin ánimo de fijar residencia habitual, podrán inscribirse como no residentes en el Registro de Matrícula Consular, conservando su inscripción en el padrón y censo electoral del municipio español de procedencia o en el PERE/CERA","Los inscritos como residentes no causarán alta en el PERE","Los españoles que residan habitualmente en el extranjero y aquellos que trasladen su residencia habitual deberán inscribirse en el Registro de Matrícula de la Oficina o Sección Consular de la Misión Diplomática correspondiente"], r: 2 },
  { p: "Para ser inscrito como residente en el Registro de Matrícula Consular debe:", ops: ["Acreditar identidad y nacionalidad española mediante pasaporte español o DNI","En todo caso se exigirá certificación literal de nacimiento del Registro Civil Español con antelación máxima de 6 meses","Aportar cualquier documento que acredite residencia (residencia o solicitud de residencia ante autoridades migratorias locales; contrato de trabajo local o certificado de actividad de institución local; inscripción en centro de estudios local; inscripción en centro de estudios de hijos; contrato de alquiler o facturas de luz, agua, electricidad o teléfono)","Las opciones a) y c) son correctas"], r: 3 },
  { p: "En el visado de residencia y trabajo por cuenta ajena, el solicitante deberá acreditar ante la Misión Diplomática donde presenta su expediente:", ops: ["Dispone de medios para traslado y estancia en España hasta incorporación laboral","No tiene antecedentes penales","Estudios debidamente documentados que permiten realizar la tarea","Que el empleador está al día con sus obligaciones fiscales en España"], r: 1 },
  { p: "El visado de reagrupación familiar en régimen comunitario permite reagrupar a los siguientes familiares:", ops: ["A los hijos, cónyuge y familiares a cargo del ciudadano comunitario o de su cónyuge","Únicamente a hijos, cónyuge y familiares a cargo del ciudadano comunitario","Únicamente a hijos y cónyuge del ciudadano comunitario o de su cónyuge","Únicamente a hijos y cónyuge del ciudadano comunitario"], r: 0 },
  { p: "Los visados de corta duración:", ops: ["Habilitan permanencia en el territorio de los Estados Miembros con un máximo de 90 días por año","Habilitan permanencia con un máximo de 30 días por semestre","Habilitan permanencia con un máximo de 90 días por semestre","Habilitan permanencia con un máximo de 30 días por trimestre"], r: 2 },
  { p: "Los Visados de Tránsito Aeroportuario:", ops: ["Habilitan a su titular a ingresar, exclusivamente, al territorio del estado miembro que lo expidió","Habilitan a su titular a permanecer en la zona de tránsito internacional de los aeropuertos de los Estados miembros pero en ningún caso a acceder al territorio de éstos","Habilitan a su titular a permanecer en la zona de tránsito internacional de los aeropuertos de los Estados miembros o acceder, si fuese necesario, al territorio de éstos","Son requeridos a los ciudadanos independientemente de su nacionalidad"], r: 1 },
  { p: "Las certificaciones del Registro Civil (de nacimiento, matrimonio, defunción) son consideradas por la Ley del Registro Civil como:", ops: ["Notas informativas","Inscripciones marginales","Documentos públicos","Asientos marginales"], r: 2 },
  { p: "Según la Ley del Registro Civil, éste se encuentra integrado por los siguientes Registros:", ops: ["Solo los municipales y el Registro Central","Solo los municipales y los consulares","Los municipales, los consulares y el Registro Central","Ninguna de las anteriores"], r: 2 },
  { p: "Según la Ley del Registro Civil, las llamadas declaraciones de fallecimiento se inscriben como inscripción marginal:", ops: ["En la primera sección, Nacimientos","En la segunda sección, Matrimonios","En la tercera sección, Defunciones","Ninguna de las anteriores"], r: 0 },
  { p: "El conjunto de decisiones y acciones del Gobierno en sus relaciones con otros actores de la escena internacional, con objeto de definir, promover, desarrollar y defender los valores e intereses de España en el exterior, se denomina en la Ley 2/2014:", ops: ["Política Exterior del Estado","Acción Exterior del Estado","Servicio Exterior del Estado","Actuación Exterior del Estado"], r: 0 },
  { p: "Las Embajadas y Consulados forman parte de:", ops: ["La Política Exterior del Estado","La Acción Exterior del Estado","El Servicio Exterior del Estado","La Actuación Exterior del Estado"], r: 2 },
  { p: "¿Cuál de los siguientes objetivos de la Política Exterior del Estado estaría indebidamente formulado según el artículo 2 de la Ley 2/2014?", ops: ["El fomento de instituciones multilaterales fuertes y legítimas","El fortalecimiento de la Comunidad Latinoamericana de Naciones","La seguridad y bienestar de España y sus ciudadanos","Ninguno"], r: 1 },
  { p: "Las Oficinas Consulares podrán ser:", ops: ["Generales y honorarias","De carrera, generales y honorarias","De carrera y generales","De carrera y honorarias"], r: 3 },
  { p: "Instrumento admitido por el Derecho Internacional, otorgado por Su Majestad el Rey con el refrendo del Ministro de Asuntos Exteriores y de Cooperación, en el que constará, además de su nombre y categoría personal, la circunscripción consular y la sede de la Oficina a su cargo:", ops: ["Carta orden","Carta diplomática","Carta patente","Carta puebla"], r: 2 },
  { p: "La Jefatura de la Misión Diplomática Permanente será ejercida por un:", ops: ["Embajador Extraordinario y Plenipotenciario","Embajador Representante Permanente","Embajador Representante Plenipotenciario","Embajador Representante Extraordinario"], r: 0 },
  { p: "Los Embajadores serán designados y cesarán por:", ops: ["Real Decreto del Ministro de Asuntos Exteriores y de Cooperación","Real Decreto acordado en Consejo de Ministros a propuesta del Ministro de Asuntos Exteriores y de Cooperación","Orden del Ministro de Asuntos Exteriores y de Cooperación","Real Orden acordada en Consejo de Ministros a propuesta del Ministro de Asuntos Exteriores y de Cooperación"], r: 1 },

/* ============ UTILIDADES ============ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function buildPreguntas() {
  return shuffle(BASE.map(q => {
    const idx = shuffle([0,1,2,3]);
    return { p: q.p, ops: idx.map(i => q.ops[i]), r: idx.indexOf(q.r) };
  }));
}
function fmtDate(iso) {
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm} ${hh}:${mi}`;
}

/* ============ STORAGE: HISTORIAL, TEMA, AUTO-ADVANCE ============ */
const STORAGE_KEY = 'simulacro_consulado_v1';
const SETTINGS_KEY = 'simulacro_consulado_settings';

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return { theme: 'auto', autoadvance: 'off' };
    const s = JSON.parse(raw);
    return {
      theme: ['light','dark','auto'].includes(s.theme) ? s.theme : 'auto',
      autoadvance: ['on','off'].includes(s.autoadvance) ? s.autoadvance : 'off'
    };
  } catch (e) { return { theme: 'auto', autoadvance: 'off' }; }
}
function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
  catch (e) { console.warn('No se pudo guardar configuración:', e); }
}
let SETTINGS = loadSettings();

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch (e) { return []; }
}
function saveHistory(history) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); }
  catch (e) { console.warn('No se pudo guardar el historial:', e); }
}
function addAttempt(score, total) {
  const history = loadHistory();
  history.push({
    date: new Date().toISOString(),
    score: score,
    total: total,
    percentage: Math.round((score / total) * 100)
  });
  saveHistory(history);
  return history;
}
function clearHistory() {
  if (confirm('¿Borrar todo el historial de intentos? Esta acción no se puede deshacer.')) {
    localStorage.removeItem(STORAGE_KEY);
    renderStats();
    renderHistoryPanel();
    if (document.getElementById('resultado').classList.contains('show')) {
      const best = getBest([]);
      renderComparacion(null, best);
    }
  }
}
function getBest(history) {
  if (!history.length) return null;
  return history.reduce((best, cur) => cur.score > best.score ? cur : best, history[0]);
}
function getPrevious(history) {
  if (history.length < 2) return null;
  return history[history.length - 2];
}

/* ============ TEMA ============ */
function effectiveTheme(theme) {
  if (theme === 'auto') {
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  return theme;
}
function applyTheme() {
  const t = effectiveTheme(SETTINGS.theme);
  document.documentElement.setAttribute('data-theme', t);
}
function initTheme() {
  applyTheme();
  // Escuchar cambios del sistema si eligió "auto"
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (SETTINGS.theme === 'auto') applyTheme();
    });
  }
}

/* ============ MENÚ DE CONFIGURACIÓN ============ */
function refreshMenuSelection() {
  document.querySelectorAll('.config-options').forEach(group => {
    const g = group.getAttribute('data-group');
    const value = g === 'theme' ? SETTINGS.theme : SETTINGS.autoadvance;
    group.querySelectorAll('button').forEach(btn => {
      const isActive = btn.getAttribute('data-value') === value;
      btn.classList.toggle('active', isActive);
      btn.querySelector('.ck').textContent = isActive ? '✓' : '';
    });
  });
}
function openConfigMenu() {
  refreshMenuSelection();
  document.getElementById('config-dropdown').classList.add('open');
  document.getElementById('config-toggle').classList.add('open');
}
function closeConfigMenu() {
  document.getElementById('config-dropdown').classList.remove('open');
  document.getElementById('config-toggle').classList.remove('open');
}
document.getElementById('config-toggle').addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = document.getElementById('config-dropdown').classList.contains('open');
  if (isOpen) closeConfigMenu(); else openConfigMenu();
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.config-menu')) closeConfigMenu();
});
document.querySelectorAll('.config-options').forEach(group => {
  const g = group.getAttribute('data-group');
  group.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      SETTINGS[g] = btn.getAttribute('data-value');
      saveSettings(SETTINGS);
      if (g === 'theme') applyTheme();
      refreshMenuSelection();
      // No cerramos el menú para que el usuario pueda tocar varias opciones
    });
  });
});
document.getElementById('cfg-clear').addEventListener('click', () => {
  closeConfigMenu();
  clearHistory();
});

/* ============ STATS / HISTORIAL UI ============ */
function renderStats() {
  const history = loadHistory();
  const best = getBest(history);
  document.getElementById('stat-record').textContent = best ? `${best.score}/${best.total} (${best.percentage}%)` : '—';
  document.getElementById('stat-attempts').textContent = history.length;
}
function renderHistoryPanel() {
  const history = loadHistory().slice().reverse(); // más reciente primero
  const cont = document.getElementById('history-content');
  if (!history.length) {
    cont.innerHTML = '<div class="empty">Aún no hay intentos registrados. Completá el simulacro y tu primer resultado aparecerá acá.</div>';
    return;
  }
  let html = '<table><thead><tr><th>Fecha</th><th>Resultado</th><th class="bar-cell">%</th></tr></thead><tbody>';
  for (const h of history) {
    html += `<tr>
      <td>${fmtDate(h.date)}</td>
      <td><strong>${h.score}</strong>/${h.total}</td>
      <td class="bar-cell"><div class="bar"><div style="width:${h.percentage}%"></div></div></td>
    </tr>`;
  }
  html += '</tbody></table>';
  html += '<div style="margin-top:12px; text-align:right;"><button class="btn-reiniciar" style="font-size:11px; padding:6px 12px; background:var(--gray);" onclick="clearHistory()">Borrar historial</button></div>';
  cont.innerHTML = html;
}
function renderComparacion(prevAttempt, bestAttempt) {
  const cont = document.getElementById('comparacion');
  const currentScore = correctas;
  const total = preguntas.length;
  const currentPct = Math.round((currentScore / total) * 100);
  let prevBlock, bestBlock, deltaBlock;

  // Bloque anterior
  if (prevAttempt) {
    const delta = currentScore - prevAttempt.score;
    const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '=';
    const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'eq';
    const sign = delta > 0 ? '+' : '';
    prevBlock = `<div class="label">Anterior</div>
      <div class="val">${prevAttempt.score}/${prevAttempt.total}</div>
      <div class="delta ${cls}">${arrow} ${sign}${delta}</div>`;
  } else {
    prevBlock = `<div class="label">Anterior</div>
      <div class="val" style="font-size:16px;">—</div>
      <div class="delta eq">Primer intento</div>`;
  }

  // Bloque actual
  const currBlock = `<div class="label">Este intento</div>
    <div class="val">${currentScore}/${total}</div>
    <div class="delta eq">${currentPct}%</div>`;

  // Bloque mejor
  if (bestAttempt) {
    const isRecord = currentScore >= bestAttempt.score && (prevAttempt == null || currentScore > prevAttempt.score);
    bestBlock = `<div class="label">Récord</div>
      <div class="val">${bestAttempt.score}/${bestAttempt.total}</div>
      <div class="delta ${isRecord ? 'up' : 'eq'}">${isRecord ? '🏆 ¡Nuevo!' : bestAttempt.percentage + '%'}</div>`;
  } else {
    bestBlock = `<div class="label">Récord</div>
      <div class="val">${currentScore}/${total}</div>
      <div class="delta up">🏆 ¡Primero!</div>`;
  }

  cont.innerHTML = `<div class="cmp">${prevBlock}</div><div class="cmp">${currBlock}</div><div class="cmp">${bestBlock}</div>`;
}
document.getElementById('btn-history').addEventListener('click', () => {
  const panel = document.getElementById('history-panel');
  const isOpen = panel.classList.toggle('show');
  if (isOpen) renderHistoryPanel();
});

/* ============ QUIZ ============ */
const LETRAS = ["a","b","c","d"];
let preguntas = [];
let actual = 0;
let correctas = 0;
let respondida = false;
let autoAdvanceTimer = null;
const AUTO_ADVANCE_MS = 1000;

function renderPregunta() {
  respondida = false;
  const q = preguntas[actual];
  document.getElementById("num-label").textContent = `Pregunta ${actual + 1} / ${preguntas.length}`;
  document.getElementById("pregunta-texto").textContent = q.p;
  document.getElementById("prog-label").textContent = `Pregunta ${actual + 1} de ${preguntas.length}`;
  document.getElementById("prog-score").textContent = `Correctas: ${correctas}`;
  document.getElementById("prog-bar").style.width = `${(actual / preguntas.length) * 100}%`;
  const fb = document.getElementById("feedback");
  fb.className = "feedback"; fb.textContent = "";
  document.getElementById("btn-siguiente").classList.remove("visible");
  const cont = document.getElementById("opciones");
  cont.innerHTML = "";
  q.ops.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.className = "opcion";
    btn.innerHTML = `<span class="letra">${LETRAS[i]}</span><span>${op}</span>`;
    btn.onclick = () => seleccionar(i, btn);
    cont.appendChild(btn);
  });
}

function seleccionar(idx, btn) {
  if (respondida) return;
  respondida = true;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  document.getElementById('auto-progress').classList.remove('show');
  const q = preguntas[actual];
  const botones = document.querySelectorAll(".opcion");
  botones.forEach(b => b.disabled = true);
  const fb = document.getElementById("feedback");
  const esCorrecta = idx === q.r;
  if (esCorrecta) {
    btn.classList.add("correcta");
    correctas++;
    fb.textContent = "✓ ¡Correcto!";
    fb.className = "feedback ok show";
  } else {
    btn.classList.add("incorrecta");
    botones[q.r].classList.add("correcta");
    fb.textContent = `✗ Incorrecto. La respuesta correcta es: "${q.ops[q.r]}"`;
    fb.className = "feedback mal show";
  }
  document.getElementById("prog-score").textContent = `Correctas: ${correctas}`;
  const esUltima = actual >= preguntas.length - 1;

  // Auto-advance solo si: respuesta correcta + opción activada + NO es la última
  if (esCorrecta && SETTINGS.autoadvance === 'on' && !esUltima) {
    const ap = document.getElementById('auto-progress');
    ap.classList.add('show');
    // Animación de la barra de progreso
    requestAnimationFrame(() => {
      ap.firstElementChild.style.transition = `width ${AUTO_ADVANCE_MS}ms linear`;
      ap.firstElementChild.style.width = '100%';
    });
    autoAdvanceTimer = setTimeout(() => {
      autoAdvanceTimer = null;
      ap.classList.remove('show');
      ap.firstElementChild.style.transition = 'none';
      ap.firstElementChild.style.width = '0';
      actual++;
      renderPregunta();
    }, AUTO_ADVANCE_MS);
  } else {
    if (esUltima) {
      setTimeout(mostrarResultado, 800);
    } else {
      document.getElementById("btn-siguiente").classList.add("visible");
    }
  }
}

function mostrarResultado() {
  ["num-label","pregunta-texto","opciones","feedback"].forEach(id => document.getElementById(id).style.display = "none");
  document.getElementById("btn-siguiente").style.display = "none";
  document.getElementById("prog-bar").style.width = "100%";
  document.getElementById("prog-label").textContent = "Simulacro completado";
  document.getElementById("prog-score").textContent = `Correctas: ${correctas}`;

  // Guardar y refrescar historial
  const total = preguntas.length;
  const history = addAttempt(correctas, total);
  const best = getBest(history);
  const previous = getPrevious(history); // history[-2] = el de antes del actual
  renderStats();

  const pct = (correctas / total) * 100;
  document.getElementById("puntaje-num").textContent = correctas;
  const icono = document.getElementById("icono-resultado");
  const veredicto = document.getElementById("veredicto");
  const mensaje = document.getElementById("mensaje-final");
  if (pct >= 70) {
    icono.textContent = "🏅"; icono.className = "barra-resultado aprobado";
    veredicto.textContent = "¡Muy bien!";
    mensaje.textContent = "Resultado sólido. Seguí repasando procedimiento administrativo y representación consular para llegar al examen con más margen.";
  } else if (pct >= 50) {
    icono.textContent = "📋"; icono.className = "barra-resultado repaso";
    veredicto.textContent = "En camino";
    mensaje.textContent = "Buen arranque. Reforzá Ley 39/2015, funciones consulares y geografía española para mejorar el puntaje.";
  } else {
    icono.textContent = "📚"; icono.className = "barra-resultado reforzar";
    veredicto.textContent = "A reforzar";
    mensaje.textContent = "Hay margen para crecer. Concentrá el estudio en Constitución, procedimiento administrativo y representaciones diplomáticas.";
  }
  renderComparacion(previous, best);
  document.getElementById("resultado").className = "resultado show";
}

document.getElementById("btn-siguiente").addEventListener("click", () => {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  const ap = document.getElementById('auto-progress');
  ap.classList.remove('show');
  ap.firstElementChild.style.transition = 'none';
  ap.firstElementChild.style.width = '0';
  actual++; renderPregunta();
});

function reiniciar() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  const ap = document.getElementById('auto-progress');
  ap.classList.remove('show');
  ap.firstElementChild.style.transition = 'none';
  ap.firstElementChild.style.width = '0';
  actual = 0; correctas = 0; respondida = false;
  preguntas = buildPreguntas();
  ["num-label","pregunta-texto","opciones","feedback"].forEach(id => document.getElementById(id).style.display = "");
  document.getElementById("btn-siguiente").style.display = "";
  document.getElementById("resultado").className = "resultado";
  renderPregunta();
}

/* ============ INIT ============ */
initTheme();
renderStats();
refreshMenuSelection();
preguntas = buildPreguntas();
renderPregunta();
</script>
